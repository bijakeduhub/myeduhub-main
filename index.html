<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY Edu Hub – Where Learning Meets Success</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#1B2B6B">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2B6B;
    --navy-light: #243580;
    --gold: #C9963A;
    --gold-light: #E8B84B;
    --bg: #F5F7FF;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 24px 20px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(27,43,107,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,150,58,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ======= TOP: LOGO ======= */
  .top {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative; z-index:1;
  }

  .logo-img {
    width: 140px; height: 140px;
    object-fit: contain;
    filter: drop-shadow(0 8px 24px rgba(27,43,107,0.20));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .logo-fallback {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }

  .logo-fallback-icon {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    box-shadow: 0 8px 28px rgba(27,43,107,0.30);
  }

  .logo-fallback-name {
    font-family: 'Poppins', sans-serif;
    font-size: 28px; color: var(--navy);
  }

  .tagline {
    font-size: 12px; font-weight: 900;
    color: var(--gold); letter-spacing: 1.5px;
    text-transform: uppercase; margin-top: 4px;
  }

  /* ======= MIDDLE: BUTTONS ======= */
  .middle {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    width: 100%; max-width: 360px;
    margin: 20px 0;
    position: relative; z-index:1;
  }

  .btn {
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
    width: 100%; padding: 13px 24px;
    border-radius: 16px;
    font-family: 'Poppins', sans-serif;
    font-size: 17px; text-decoration: none;
    transition: all 0.22s;
    position: relative; overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent);
  }

  .btn:hover { transform: translateY(-3px) scale(1.02); }
  .btn:active { transform: scale(0.98); }

  /* Gold border pulse on main button */
  .btn-wrap {
    width: 100%; position: relative;
  }
  .pulse-ring {
    position: absolute; inset: -4px;
    border-radius: 20px;
    border: 3px solid rgba(201,150,58,0.4);
    animation: pulseRing 2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes pulseRing {
    0%   { transform: scale(1); opacity: 0.9; }
    100% { transform: scale(1.05); opacity: 0; }
  }

  .btn-primary {
    background: var(--navy);
    color: white;
    box-shadow: 0 10px 28px rgba(27,43,107,0.35);
    border: 2px solid rgba(201,150,58,0.4);
  }
  .btn-primary:hover {
    background: var(--navy-light);
    box-shadow: 0 16px 36px rgba(27,43,107,0.45);
  }

  .btn-secondary {
    background: white; color: var(--navy);
    box-shadow: 0 4px 16px rgba(27,43,107,0.08);
    border: 2px solid rgba(27,43,107,0.08);
  }
  .btn-secondary:hover {
    border-color: var(--navy);
    box-shadow: 0 8px 24px rgba(27,43,107,0.15);
  }

  .coming-badge {
    font-size: 10px; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 900; background: var(--gold);
    color: white; padding: 2px 8px;
    border-radius: 50px; margin-left: 4px;
    letter-spacing: 0.5px;
  }

  /* ======= BOTTOM: SOCIAL ======= */
  .bottom {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    width: 100%; max-width: 360px;
    position: relative; z-index:1;
  }

  .follow-label {
    font-size: 11px; font-weight: 900;
    color: #bbb; letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .social-row {
    display: flex; gap: 12px; width: 100%;
  }

  .social-btn {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    gap: 8px; padding: 14px 12px;
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px; color: white;
    text-decoration: none; transition: all 0.2s;
  }
  .social-btn:hover { transform: translateY(-2px); }
  .social-btn:active { transform: scale(0.97); }

  .social-threads {
    background: #000;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }

  .social-fb {
    background: #1877F2;
    box-shadow: 0 6px 18px rgba(24,119,242,0.28);
  }

  .footer-copy {
    font-size: 11px; color: #CCC;
    font-weight: 700; margin-top: 4px;
  }
</style>
</head>
<body>

  <!-- TOP: LOGO -->
  <div class="top">
    <img class="logo-img" src="logo.png" alt="MY Edu Hub"
         onerror="this.style.display='none';document.getElementById('fb').style.display='flex';">
    <div class="logo-fallback" id="fb" style="display:none;">
      <div class="logo-fallback-icon">🎓</div>
      <div class="logo-fallback-name">MY Edu Hub</div>
    </div>
    <div class="tagline">Where Learning Meets Success</div>
  </div>

  <!-- MIDDLE: BUTTONS -->
  <div class="middle">

    <div class="btn-wrap">
      <div class="pulse-ring"></div>
      <a class="btn btn-primary" href="https://games.bijakeduhub.com" target="_blank">
        🎮 Main Games Sekarang!
      </a>
    </div>

    <a class="btn btn-secondary" href="#" onclick="return false;">
      📚 Tips Belajar <span class="coming-badge">SOON</span>
    </a>

    <a class="btn btn-secondary" href="#" onclick="return false;">
      🏆 Leaderboard <span class="coming-badge">SOON</span>
    </a>

  </div>

  <!-- BOTTOM: SOCIAL -->
  <div class="bottom">
    <div class="follow-label">Ikuti Kami</div>

    <div class="social-row">
      <a class="social-btn social-threads" href="https://www.threads.com/@__myeduhub" target="_blank">
        <svg width="18" height="18" viewBox="0 0 192 192" fill="white">
          <path d="M141.537 88.988a66.667 66.667 0 0 0-2.518-1.143c-1.482-27.307-16.403-42.94-41.457-43.1h-.34c-14.986 0-27.449 6.396-35.12 18.036l13.779 9.452c5.73-8.695 14.724-10.548 21.348-10.548h.229c8.249.053 14.474 2.452 18.503 7.129 2.932 3.405 4.893 8.111 5.864 14.05-7.314-1.243-15.224-1.626-23.68-1.14-23.82 1.371-39.134 15.264-38.105 34.568.522 9.792 5.4 18.216 13.735 23.719 7.047 4.652 16.124 6.927 25.557 6.412 12.458-.683 22.231-5.436 29.049-14.127 5.178-6.6 8.453-15.153 9.899-25.93 5.937 3.583 10.337 8.298 12.767 13.966 4.132 9.635 4.373 25.468-8.546 38.376-11.319 11.308-24.925 16.2-45.488 16.351-22.809-.169-40.06-7.484-51.275-21.742C35.236 139.966 29.808 120.682 29.605 96c.203-24.682 5.63-43.966 16.133-57.317C56.954 24.425 74.206 17.11 97.015 16.94c22.975.17 40.526 7.52 52.171 21.847 5.71 7.026 9.991 15.976 12.763 26.66l16.218-4.12c-3.333-12.917-8.891-24.045-16.647-33.187C147.661 10.974 125.957 1.316 97.08 1.085h-.229C68.064 1.317 46.587 10.99 32.366 28.553 19.916 44.119 13.536 66.026 13.305 96v.027c.231 29.974 6.611 51.88 19.061 67.446 14.221 17.563 35.698 27.236 64.888 27.468h.229c25.96-.188 44.142-6.977 59.208-22.024 19.73-19.709 19.131-44.242 12.625-59.363-4.577-10.671-13.286-19.392-27.779-24.566zM96.678 143.02c-10.433.576-21.286-4.097-27.357-11.243-4.165-4.886-6.243-11.238-6.048-17.864.443-15.016 13.515-21.708 33.943-22.879 3.997-.23 7.913-.34 11.742-.34 5.97 0 11.812.489 17.448 1.448-2.124 26.332-15.203 50.146-29.728 50.878z"/>
        </svg>
        Threads
      </a>

      <a class="social-btn social-fb" href="https://www.facebook.com/share/1JJvrBdGMh/" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">

        Facebook
      </a>
    </div>

    <div class="footer-copy">© 2026 MY Edu Hub • bijakeduhub.com</div>
  </div>

</body>
</html>
